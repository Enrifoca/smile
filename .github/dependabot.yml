version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "Enrifoca"
    labels:
      - "dependencies"
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
